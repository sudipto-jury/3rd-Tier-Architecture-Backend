services:

  # ================================
  # PostgreSQL Database
  # ================================
  postgres:
    image: postgres:16-alpine
    container_name: awslearn_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ryu
      POSTGRES_DB: awslearn

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d awslearn"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - awslearn_network

  # ================================
  # Node.js Backend API
  # ================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: awslearn_backend
    restart: unless-stopped

    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:ryu@postgres:5432/awslearn
      JWT_SECRET: mysecretkey_changethis_123456

    ports:
      - "5000:5000"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - awslearn_network

# ================================
# Volumes
# ================================
volumes:
  postgres_data:
    driver: local

# ================================
# Networks
# ================================
networks:
  awslearn_network:
    driver: bridge